<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil NovaCraft</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:Poppins,sans-serif; background:#0a0a1f; color:white; display:flex; min-height:100vh; }
.sidebar { width:240px; background:rgba(20,20,40,0.95); display:flex; flex-direction:column; align-items:start; padding:24px; gap:14px; }
.sidebar .avatar { width:100px; height:100px; border-radius:50%; border:3px solid #c084fc; object-fit:cover; margin-bottom:8px; align-self:center; }
.sidebar h2 { font-size:20px; color:#c084fc; margin-bottom:12px; width:100%; text-align:center; }
.sidebar .status-container { display:flex; gap:8px; align-items:center; width:100%; justify-content:center; margin-bottom:10px; }
.sidebar .status { font-size:14px; background:#7c3aed; padding:6px 12px; border-radius:12px; }
.sidebar .logout-btn { padding:6px 12px; font-size:14px; background:linear-gradient(90deg,#ff4d4d,#ff6f6f); border:none; border-radius:12px; color:white; cursor:pointer; }
.sidebar a { text-decoration:none; color:#cfd0ff; font-size:15px; padding:10px 14px; width:100%; border-radius:8px; transition:0.2s; }
.sidebar a:hover { background:rgba(124,58,237,0.3); color:white; }
.content { flex:1; display:flex; flex-direction:column; align-items:center; padding:40px; }
.profile-card { background:rgba(15,18,40,1); border-radius:18px; padding:30px; max-width:700px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
.profile-card h1 { font-size:28px; color:#c084fc; margin-bottom:8px; text-align:center; }
.stats { display:flex; justify-content:space-around; flex-wrap:wrap; gap:20px; margin:24px 0; }
.card { background: rgba(255,255,255,0.2); border-radius:14px; padding:20px 28px; width:160px; text-align:center; box-shadow:0 5px 20px rgba(0,0,0,0.4); }
.card h3, .card p { color:#c084fc; text-shadow:0 0 3px #000; }
form { margin-top:20px; display:flex; flex-direction:column; gap:10px; max-width:500px; }
form input { padding:8px; border-radius:8px; border:none; background:rgba(255,255,255,0.1); color:white; }
form button { padding:10px; border:none; border-radius:10px; background:linear-gradient(90deg,#7c3aed,#6366f1); color:white; font-weight:600; cursor:pointer; }
</style>
</head>
<body>

<div class="sidebar">
    <img src="" alt="Avatar" class="avatar" id="sidebarAvatar">
    <h2 id="sidebarUsername">Username</h2>
    <div class="status-container">
        <div class="status" id="sidebarStatus">Status</div>
        <button class="logout-btn" onclick="logout()">Deconectare</button>
    </div>

    <a href="index.html">Acasă</a>
    <a href="despre.html">Despre</a>
    <a href="staff.html">Staff</a>
    <a href="reguli.html">Reguli</a>
    <a href="apply.html">Aplicații Staff</a>
    <a href="creators.html">Content Creators</a>
</div>

<div class="content">
    <div class="profile-card" id="profileCard">
        <h1 id="usernameTitle">Profil</h1>
        <div class="stats">
            <div class="card">
                <h3 id="rank">Grad</h3>
                <p>Grad utilizator</p>
            </div>
            <div class="card">
                <h3 id="reports">0</h3>
                <p>Rapoarte completate</p>
            </div>
            <div class="card">
                <h3 id="days">0</h3>
                <p>Zile de vechime</p>
            </div>
        </div>

        <form id="editForm" onsubmit="saveProfile(); return false;">
            <input type="text" id="editAvatar" placeholder="Link avatar">
            <input type="text" id="editBackground" placeholder="Link background card">
            <button type="submit">Salvează personalizare</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCSUlpL7p8TTGKn-Qt8ELv47NUpj46TgwU",
    authDomain: "novacraft-4d00d.firebaseapp.com",
    databaseURL: "https://novacraft-4d00d-default-rtdb.firebaseio.com",
    projectId: "novacraft-4d00d",
    storageBucket: "novacraft-4d00d.appspot.com",
    messagingSenderId: "353709305346",
    appId: "1:353709305346:web:8f9515331aec32d1be011b",
    measurementId: "G-05NDZXVMLZ"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
let currentUID = urlParams.get("uid");

const editForm = document.getElementById("editForm");

auth.onAuthStateChanged(user => {
    if(!user && !currentUID){ 
        window.location.href="index.html"; 
        return; 
    }

    if(!currentUID && user) currentUID = user.uid;

    const isOwner = user && user.uid === currentUID;

    db.ref("users/"+currentUID).once("value").then(snapshot=>{
        const data = snapshot.val();
        if(!data || !data.username){ 
            alert("Userul nu există!"); 
            return;
        }

        const username = data.username;
        const rank = data.rank || "Membru";
        const status = data.status || "Inactiv";
        const reports = data.reportsCompleted || 0;
        const joined = data.joined || Date.now();
        const avatar = data.avatarURL || `https://ui-avatars.com/api/?name=${username}&background=7c3aed&color=fff&size=140`;
        const background = data.backgroundURL;

        document.getElementById("sidebarAvatar").src = avatar;
        document.getElementById("sidebarUsername").textContent = username;
        document.getElementById("sidebarStatus").textContent = status;

        document.getElementById("usernameTitle").textContent = username + (isOwner ? " (Profilul tău)" : "");
        document.getElementById("rank").textContent = rank;
        document.getElementById("reports").textContent = reports;
        document.getElementById("days").textContent = Math.floor((Date.now()-joined)/86400000);

        if(background) document.getElementById("profileCard").style.background = `url(${background}) center/cover no-repeat`;

        editForm.style.display = isOwner ? "flex" : "none";
    });
});

function saveProfile(){
    const avatar = document.getElementById("editAvatar").value.trim();
    const background = document.getElementById("editBackground").value.trim();
    const user = auth.currentUser;
    if(!user) return alert("Nu ești logat");

    db.ref("users/"+user.uid).update({
        avatarURL: avatar || null,
        backgroundURL: background || null
    }).then(()=>{
        if(avatar) document.getElementById("sidebarAvatar").src = avatar;
        if(background) document.getElementById("profileCard").style.background = `url(${background}) center/cover no-repeat`;
        alert("Personalizare salvată!");
    }).catch(err=>alert(err.message));
}

function logout(){
    auth.signOut().then(()=> window.location.href="index.html");
}
</script>
</body>
